{% extends "base.html" %}
{% block title %}Register teacher{% endblock %}
{% block content %}
<h3>Register a new teacher</h3>
<div class="card" style="max-width: 480px;">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {{ field.errors }}
                </div>
            {% endfor %}
            <button class="btn btn-primary" type="submit">Register & generate QR code</button>
        </form>
    </div>
</div>
{% endblock %}
